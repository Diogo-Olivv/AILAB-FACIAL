<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AILAB · Cadastro</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0b0f1a" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="vendor/face-api.min.js"></script>
</head>
<body>
  <header>
    <h1>AILAB · Cadastro de participante</h1>
    <a href="index.html">Voltar</a>
  </header>
  <main>
    <div id="video-wrap">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <div class="form-row">
      <label for="nome">Nome (snake_case)</label>
      <input id="nome" type="text" placeholder="ex.: maria_silva" autocomplete="off" />
    </div>

    <button id="btn-capturar">Capturar 8 fotos</button>
    <div id="status">Carregando…</div>

    <ul id="lista" class="lista-pessoas"></ul>
  </main>

  <script type="module" src="js/enroll-ui.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(console.error);
    }
  </script>
</body>
</html>
